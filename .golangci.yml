run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

linters-settings:
  misspell:
    locale: US

issues:
  exclude-rules:
    # Test helpers occasionally swallow errors deliberately.
    - path: _test\.go
      linters:
        - errcheck
