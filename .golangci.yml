version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

  settings:
    misspell:
      locale: US
    errcheck:
      # io.Closer.Close and fmt.Fprint* are conventionally unchecked.
      exclude-functions:
        - (io.Closer).Close
        - (*database/sql.Rows).Close
        - (*os.File).Close
        - (*text/tabwriter.Writer).Flush
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
